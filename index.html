
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀🌌 UNIVOICER 🪐✨</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050b17;
      --bg-soft: #0b1326;
      --panel: #101c35;
      --panel-2: #162543;
      --text: #dff3ff;
      --muted: #8fa7bf;
      --line: rgba(111, 180, 255, .28);
      --accent: #2bf7ff;
      --accent-hover: #6cfbff;
      --focus: #29f2ff;
      --accent-glow: 0 0 0 1px rgba(43, 247, 255, .45), 0 0 16px rgba(43, 247, 255, .35), 0 0 34px rgba(43, 247, 255, .2);
      --focus-glow: 0 0 0 3px rgba(41, 242, 255, .22), 0 0 26px rgba(41, 242, 255, .25);
      --metal-dark: #0a1224;
      --metal-mid: #1a2b4b;
      --metal-light: #7eaed8;
      --neon-cyan: #6ef7ff;
      --neon-purple: #b98cff;
      --ok: #179d6c;
      --ok-soft: rgba(23, 157, 108, .18);
      --rare-comun: #52d88a;
      --rare-raro: #5da8ff;
      --rare-epico: #b786ff;
      --rare-legendario: #f4c45a;
      --shadow: 0 18px 40px rgba(2, 8, 20, .62);
      --shadow-soft: 0 10px 24px rgba(3, 11, 29, .52);
      --radius: 22px;
      --control-bg: linear-gradient(165deg, rgba(12, 20, 39, .96), rgba(22, 38, 68, .95));
      --control-border: rgba(145, 214, 255, .52);
      --control-shadow: inset 0 1px 0 rgba(189, 232, 255, .08), 0 0 0 1px rgba(31, 78, 131, .3);
      --toon-border: 3px solid color-mix(in srgb, var(--accent) 58%, #dff6ff);
      --toon-shadow: 0 6px 0 rgba(2, 8, 20, .72), 0 14px 0 rgba(2, 8, 20, .42), 0 24px 28px rgba(2, 8, 20, .44);
      --toon-pop: cubic-bezier(.2, .92, .28, 1.18);
      --toon-bg-panel: linear-gradient(160deg, rgba(34, 93, 173, .94), rgba(97, 56, 171, .92));
      --toon-accent-2: #ff5cf2;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", "Trebuchet MS", cursive, sans-serif;
      font-size: 15px;
      letter-spacing: .01em;
      background:
        radial-gradient(circle at 10% 10%, rgba(120, 170, 255, .3), transparent 34%),
        radial-gradient(circle at 84% 6%, rgba(43, 247, 255, .22), transparent 36%),
        radial-gradient(circle at 76% 74%, rgba(136, 82, 255, .2), transparent 40%),
        radial-gradient(circle at 18% 92%, rgba(59, 197, 255, .2), transparent 34%),
        radial-gradient(circle at 92% 80%, rgba(255, 168, 130, .18), transparent 32%),
        linear-gradient(180deg, rgba(6, 12, 27, .82), rgba(5, 11, 24, .92)),
        var(--bg);
      color: var(--text);
      line-height: 1.55;
      position: relative;
      isolation: isolate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background-image:
        radial-gradient(1.2px 1.2px at 7% 16%, rgba(228, 244, 255, .95), transparent 75%),
        radial-gradient(1.5px 1.5px at 18% 66%, rgba(234, 240, 255, .86), transparent 76%),
        radial-gradient(1.1px 1.1px at 34% 32%, rgba(208, 233, 255, .9), transparent 74%),
        radial-gradient(1.4px 1.4px at 51% 22%, rgba(214, 242, 255, .9), transparent 74%),
        radial-gradient(1.2px 1.2px at 64% 76%, rgba(231, 240, 255, .78), transparent 75%),
        radial-gradient(1.3px 1.3px at 81% 43%, rgba(220, 243, 255, .86), transparent 74%),
        radial-gradient(1.4px 1.4px at 94% 72%, rgba(237, 246, 255, .88), transparent 75%),
        radial-gradient(1.8px 1.8px at 13% 45%, rgba(255, 255, 255, .95), transparent 76%),
        radial-gradient(1.6px 1.6px at 44% 86%, rgba(237, 244, 255, .85), transparent 76%),
        radial-gradient(2px 2px at 73% 14%, rgba(245, 250, 255, .95), transparent 78%),
        radial-gradient(1.8px 1.8px at 89% 58%, rgba(240, 247, 255, .84), transparent 77%);
      opacity: .74;
      animation: starsDrift 24s linear infinite;
    }

    body::after {
      background:
        radial-gradient(circle at 85% 18%, rgba(255, 170, 102, .24), rgba(255, 170, 102, .05) 13%, transparent 24%),
        radial-gradient(circle at 86% 18%, rgba(255, 232, 199, .2), transparent 5%),
        radial-gradient(circle at 13% 82%, rgba(124, 219, 255, .21), rgba(124, 219, 255, .05) 12%, transparent 22%),
        radial-gradient(circle at 45% 8%, rgba(204, 137, 255, .16), transparent 20%);
      mix-blend-mode: screen;
      opacity: .62;
    }

    .space-decor {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .space-decor span {
      position: absolute;
      font-size: clamp(1rem, .8rem + 1vw, 1.8rem);
      opacity: .34;
      text-shadow: 0 0 10px rgba(132, 220, 255, .36);
      animation: floatSpace 10s ease-in-out infinite;
    }

    .space-decor span:nth-child(1) { top: 10%; left: 14%; animation-delay: .6s; }
    .space-decor span:nth-child(2) { top: 28%; right: 10%; animation-delay: 2.4s; }
    .space-decor span:nth-child(3) { bottom: 14%; left: 24%; animation-delay: 4.2s; }

    .app { width: 100%; height: 100vh; padding: 12px; }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      height: 100%;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: calc(100vh - 24px);
      overflow-y: auto;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 12%, rgba(64, 191, 255, .22), transparent 42%),
        radial-gradient(circle at 88% 24%, rgba(147, 126, 255, .2), transparent 36%),
        linear-gradient(160deg, rgba(7, 20, 43, .97), rgba(10, 35, 70, .95));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow), var(--accent-glow), inset 0 0 0 1px rgba(112, 210, 255, .14);
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .sidebar::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background-image:
        radial-gradient(circle, rgba(222, 244, 255, .22) 1px, transparent 1.3px);
      background-size: 34px 34px;
      opacity: .25;
    }

    .title {
      margin: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: clamp(1.1rem, .9rem + 1vw, 1.8rem);
      letter-spacing: .3px;
      font-weight: 900;
      color: #e7fdff;
      text-shadow: 0 0 18px rgba(43, 247, 255, .25);
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, .35));
    }

    .title-text {
      display: inline-block;
      min-width: 0;
      max-width: 100%;
      text-align: center;
      overflow-wrap: anywhere;
      animation: titleBounce 2.6s ease-in-out infinite;
      transform-origin: center;
    }

    .title-emoji {
      display: inline-block;
      font-size: .9em;
      animation: titleOrbit 2.4s ease-in-out infinite;
      transform-origin: 50% 70%;
    }

    .title-emoji:last-child { animation-delay: 1.2s; }

    .subtitle {
      margin: 6px 0 0;
      color: #c3e8ff;
      line-height: 1.4;
      font-size: .98rem;
    }

    .sidebar-copy {
      position: relative;
      z-index: 1;
      padding: 14px 12px;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(120, 214, 255, .24);
      background: linear-gradient(145deg, rgba(6, 26, 56, .88), rgba(15, 48, 90, .56));
      box-shadow: inset 0 0 18px rgba(108, 212, 255, .12);
    }

    .sidebar-nav {
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .sidebar-item {
      width: 100%;
      max-width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      font-weight: 700;
      padding: 12px 14px;
      border-radius: 14px;
      border-color: rgba(115, 203, 255, .45);
      background: linear-gradient(165deg, rgba(8, 29, 59, .9), rgba(11, 40, 76, .82));
      box-shadow: inset 0 0 0 1px rgba(95, 189, 255, .18), 0 10px 18px rgba(2, 10, 28, .36);
    }

    .sidebar-item[disabled] {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    .content {
      min-width: 0;
      display: grid;
      gap: 16px;
      height: calc(100vh - 24px);
      overflow: hidden;
      position: relative;
      z-index: 0;
      border-radius: var(--radius);
    }

    .content > :not(.space-decor) {
      position: relative;
      z-index: 1;
    }
    .sidebar-toggle {
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-style: dashed;
      border-color: rgba(126, 220, 255, .52);
      background: linear-gradient(145deg, rgba(15, 46, 84, .9), rgba(9, 31, 62, .88));
      position: relative;
      z-index: 1;
    }

    .sidebar-toggle:hover {
      border-style: solid;
    }

    .sidebar-item-icon {
      width: 30px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border-radius: 10px;
      font-size: 1rem;
      border: 1px solid rgba(123, 217, 255, .4);
      background: radial-gradient(circle at 22% 20%, rgba(145, 225, 255, .3), rgba(23, 84, 131, .35));
      box-shadow: inset 0 0 10px rgba(91, 191, 255, .2);
      flex-shrink: 0;
    }

    .sidebar-item-text {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .sidebar-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: .98rem;
      letter-spacing: .2px;
    }

    .sidebar-hint {
      font-size: .76rem;
      color: rgba(184, 226, 255, .84);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item.active {
      background: linear-gradient(160deg, rgba(13, 60, 104, .95), rgba(21, 83, 130, .9));
      border-color: rgba(115, 236, 255, .95);
      box-shadow: 0 0 24px rgba(56, 204, 255, .32), inset 0 0 0 1px rgba(171, 236, 255, .26);
    }

    .sidebar-item.active .sidebar-item-icon {
      border-color: rgba(155, 241, 255, .9);
      background: radial-gradient(circle at 22% 20%, rgba(193, 246, 255, .46), rgba(40, 128, 178, .52));
      transform: translateY(-1px);
    }

    .layout.sidebar-collapsed { grid-template-columns: 86px minmax(0, 1fr); }
    .layout.sidebar-collapsed .sidebar { padding: 14px 10px; }
    .layout.sidebar-collapsed .sidebar-copy,
    .layout.sidebar-collapsed .sidebar-item-text { display: none; }
    .layout.sidebar-collapsed .sidebar-item { justify-content: center; padding-inline: 6px; }
    .layout.sidebar-collapsed .sidebar-toggle { padding-inline: 8px; }

    button, input, select, textarea {
      border: 1px solid var(--control-border);
      background: var(--control-bg);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease, background-color .22s ease, color .22s ease;
      box-shadow: var(--control-shadow);
    }
    button, select {
      cursor: pointer;
      min-height: 40px;
    }

    button:hover, input:hover, select:hover, textarea:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: var(--shadow-soft), var(--accent-glow);
      background: linear-gradient(165deg, rgba(16, 29, 56, .96), rgba(31, 52, 90, .94));
    }
    button:active, select:active { transform: translateY(0); box-shadow: inset 0 2px 10px rgba(0, 10, 30, .45); }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: none;
      border-color: var(--focus);
      box-shadow: var(--focus-glow), var(--control-shadow);
    }
    select option {
      background: #0a152b;
      color: #dff3ff;
    }
    select:open,
    select:focus option:checked {
      background: #0f1e3d;
      color: #e7fdff;
    }
    button.active {
      border-color: var(--accent);
      box-shadow: var(--accent-glow), var(--control-shadow);
      background: linear-gradient(165deg, rgba(19, 39, 73, .98), rgba(14, 61, 102, .95));
    }

    .view {
      display: none;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .view.active { display: block; animation: fade var(--anim-fade); }
    #viewMap {
      overflow: hidden;
    }

    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes floatSpace {
      0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
      50% { transform: translateY(-10px) rotate(4deg) scale(1.04); }
    }

    @keyframes titleBounce {
      0%, 100% { transform: translateY(0) rotate(-1deg) scale(1); }
      35% { transform: translateY(-2px) rotate(1deg) scale(1.03); }
      65% { transform: translateY(1px) rotate(-1.5deg) scale(.99); }
    }

    @keyframes titleOrbit {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      40% { transform: translateY(-2px) rotate(-12deg) scale(1.12); }
      70% { transform: translateY(1px) rotate(10deg) scale(.94); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .universe-map-shell {
      position: relative;
      width: 100%;
      height: calc(100vh - 24px);
      border: 1px solid rgba(120, 178, 255, .38);
      border-radius: var(--radius);
      box-shadow:
        0 18px 34px rgba(4, 8, 22, .45),
        inset 0 0 0 1px rgba(176, 220, 255, .14);
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 12%, rgba(81, 194, 255, .12), transparent 34%),
        radial-gradient(circle at 88% 16%, rgba(176, 110, 255, .12), transparent 32%),
        rgba(6, 11, 24, 0.95);
      scroll-behavior: smooth;
    }

    #universeMapCanvas {
      position: relative;
      min-width: 100%;
      min-height: 100%;
      background:
        linear-gradient(170deg, rgba(7, 12, 28, .98), rgba(15, 24, 48, .96));
      isolation: isolate;
    }

    .map-nebula-layer,
    .map-stars-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .map-nebula-layer {
      z-index: 0;
      background:
        radial-gradient(circle at 14% 24%, rgba(50, 173, 255, .22), transparent 35%),
        radial-gradient(circle at 84% 16%, rgba(163, 112, 255, .2), transparent 34%),
        radial-gradient(circle at 64% 74%, rgba(75, 217, 255, .14), transparent 38%),
        radial-gradient(circle at 20% 84%, rgba(139, 117, 255, .15), transparent 38%);
      filter: blur(1px) saturate(1.08);
    }

    .map-stars-layer {
      z-index: 1;
      opacity: .36;
      background-image:
        radial-gradient(1.5px 1.5px at 8% 18%, rgba(242, 251, 255, .86), transparent 70%),
        radial-gradient(1.6px 1.6px at 26% 72%, rgba(228, 238, 255, .78), transparent 72%),
        radial-gradient(1.2px 1.2px at 38% 32%, rgba(225, 248, 255, .8), transparent 74%),
        radial-gradient(1.4px 1.4px at 57% 82%, rgba(214, 233, 255, .74), transparent 72%),
        radial-gradient(1.8px 1.8px at 72% 24%, rgba(235, 250, 255, .85), transparent 72%),
        radial-gradient(1.4px 1.4px at 88% 66%, rgba(235, 241, 255, .74), transparent 72%),
        radial-gradient(1.2px 1.2px at 94% 38%, rgba(212, 231, 255, .74), transparent 72%);
      animation: starsDrift 24s linear infinite;
    }

    @keyframes starsDrift {
      from { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      to { transform: translateY(0); }
    }

    .map-world {
      position: relative;
      min-width: 100%;
      min-height: 100%;
      z-index: 2;
    }

    .map-links-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      overflow: visible;
    }

    .map-link-path {
      fill: none;
      stroke: #38c6ff;
      stroke-width: var(--link-width, 3.2);
      stroke-linecap: round;
      stroke-dasharray: var(--dash-pattern, none);
      filter:
        drop-shadow(0 0 5px rgba(76, 205, 255, .95))
        drop-shadow(0 0 11px rgba(67, 166, 255, .95))
        drop-shadow(0 0 22px rgba(53, 136, 255, .68));
      opacity: .94;
      animation: connectorGlow 1.9s ease-in-out infinite alternate, connectorFlow 5.6s linear infinite;
    }

    .map-link-path--secondary {
      stroke: rgba(255, 56, 56, .96);
      stroke-width: 2.1;
      stroke-dasharray: 9 7;
      filter:
        drop-shadow(0 0 5px rgba(255, 78, 78, .95))
        drop-shadow(0 0 12px rgba(255, 64, 64, .85))
        drop-shadow(0 0 20px rgba(255, 24, 24, .68));
      opacity: .98;
      animation: connectorGlow 1.2s ease-in-out infinite alternate, connectorFlow 1.8s linear infinite;
    }

    @keyframes connectorGlow {
      from { opacity: .72; }
      to { opacity: 1; }
    }

    @keyframes connectorFlow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -120; }
    }

    .absorption-effect {
      position: absolute;
      left: var(--start-x, 0px);
      top: var(--start-y, 0px);
      width: 26px;
      height: 26px;
      margin-left: -13px;
      margin-top: -13px;
      pointer-events: none;
      z-index: 9;
    }

    .absorption-effect::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: var(--path-length, 0px);
      transform-origin: top center;
      transform: translate(-50%, 0) rotate(var(--angle, 0deg));
      background: linear-gradient(180deg, rgba(174, 255, 245, .9), rgba(43, 247, 255, .05));
      box-shadow: 0 0 20px rgba(43, 247, 255, .65);
      border-radius: 999px;
      opacity: .78;
      animation: absorptionBeamFade .75s ease forwards;
    }

    .absorption-effect::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(222, 254, 255, .98) 0%, rgba(112, 246, 255, .85) 38%, rgba(48, 177, 255, .15) 75%, transparent 100%);
      box-shadow: 0 0 18px rgba(112, 246, 255, .95), 0 0 36px rgba(79, 169, 255, .7);
      animation: absorptionMove .75s cubic-bezier(.16, .84, .36, 1) forwards;
    }

    @keyframes absorptionMove {
      from { transform: translate(-50%, -50%) scale(1); }
      to { transform: translate(calc(-50% + var(--delta-x, 0px)), calc(-50% + var(--delta-y, 0px))) scale(.35); opacity: .15; }
    }

    @keyframes absorptionBeamFade {
      from { opacity: .95; }
      to { opacity: 0; }
    }

    /* --- INICIO NUEVO DISEÑO ORBES ESTELARES --- */
    .universe-node {
      --w: 150px;
      --h: 170px;
      --orb-size: 130px;
      --title-size: 0.95rem;
      position: absolute;
      width: var(--w);
      height: var(--h);
      border: 0;
      box-shadow: none;
      background: transparent;
      z-index: 2;
      cursor: pointer;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: nodeFloat 5.8s ease-in-out infinite;
      animation-delay: var(--float-delay, 0s);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-height: 0;
    }

    @keyframes nodeFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .universe-node:hover {
      transform: scale(1.15); /* Efecto de crecimiento que pediste */
      z-index: 10; /* Lo trae al frente al hacer hover */
      border-color: transparent;
      box-shadow: none;
      background: transparent;
    }

    .universe-node:active,
    .universe-node:focus-visible {
      border-color: transparent;
      box-shadow: none;
      background: transparent;
    }

    .universe-node--universe {
      --w: 182px;
      --h: 206px;
      --orb-size: 164px;
      --title-size: 1.02rem;
    }

    .universe-node--world {
      --w: 142px;
      --h: 164px;
      --orb-size: 126px;
      --title-size: 0.92rem;
      z-index: 4;
    }

    .universe-node.is-dragging {
      z-index: 12;
    }

    .universe-node.is-drop-target .orb-container {
      border-color: #7effa6;
      box-shadow: 0 0 38px rgba(126, 255, 166, 0.95), inset 0 0 26px rgba(126, 255, 166, 0.45);
      transform: scale(1.05);
    }

    /* El Orbe Circular con efecto Neón */
    .universe-node .orb-container {
      width: var(--orb-size);
      height: var(--orb-size);
      border-radius: 50%; /* Esto hace el círculo perfecto */
      border: 3px solid #00bfff;
      box-shadow: 0 0 18px rgba(0, 191, 255, 0.6), inset 0 0 24px rgba(0, 191, 255, 0.5);
      overflow: hidden;
      position: relative;
      transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
      background: rgba(17, 22, 42, 0.95);
      flex-shrink: 0;
    }

    .universe-node:hover .orb-container {
      box-shadow: 0 0 35px rgba(0, 191, 255, 1), inset 0 0 30px rgba(0, 191, 255, 0.8);
      border-color: #ffffff;
    }

    /* La imagen dentro del orbe (no se deforma) */
    .universe-node .universe-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    function rarityClass(rareza) {
      return `rare-${rareza.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')}`;
    }

    function rarityRank(rareza) {
      const normalized = String(rareza || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
      const order = { comun: 0, raro: 1, epico: 2, legendario: 3 };
      return Object.prototype.hasOwnProperty.call(order, normalized) ? order[normalized] : -1;
    }

    function highestRarityForActorCharacter(actorName, characterName) {
      const entries = VIDEOS.filter((video) =>
        (video.actor_de_doblaje || 'Sin actor') === actorName &&
        (video.personaje || 'Sin personaje') === characterName
      );
      if (!entries.length) return 'Bloqueado';
      const labels = ['Común', 'Raro', 'Épico', 'Legendario'];
      const best = entries.reduce((max, video) => {
        const rank = rarityRank(rarezasPermitidas(video.rareza || 'Común'));
        return rank > max ? rank : max;
      }, -1);
      return best >= 0 ? labels[best] : 'Común';
    }

    function rarityColorValue(rareza) {
      const normalized = String(rareza || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      if (normalized === 'legendario') return '#f4c45a';
      if (normalized === 'epico') return '#b786ff';
      if (normalized === 'raro') return '#5da8ff';
      if (normalized === 'comun') return '#52d88a';
      return '#8cb8ff';
    }

    function toEmbedUrl(url, autoplay = 0) {
      const id = getYoutubeId(url);
      return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&autoplay=${autoplay}&enablejsapi=1`;
    }

    function hasGreetingVideo(video) {
      return Boolean(getYoutubeId(video?.url_youtube || ''));
    }

    function groupByUniverse() {
      const grouped = VIDEOS.reduce((acc, item) => {
        const universes = Array.isArray(item.universo) ? item.universo : [item.universo];
        universes.filter(Boolean).forEach((rawName) => {
          const key = normalizeUniverseName(rawName);
          if (!key) return;
          if (!acc[key]) {
            const cleanName = String(rawName || '').trim() || 'Sin universo';
            acc[key] = {
              name: cleanName,
              videos: [],
              characters: new Set(),
              unlockedCharacters: new Set()
            };
          }
          acc[key].videos.push(item);
          const character = String(item.personaje || '').trim();
          if (character) {
            acc[key].characters.add(character);
            if (hasGreetingVideo(item)) acc[key].unlockedCharacters.add(character);
          }
        });
        return acc;
      }, {});
      return Object.fromEntries(
        Object.entries(grouped).map(([key, data]) => {
          const totalCharacters = data.characters.size;
          const unlocked = data.unlockedCharacters.size;
          const completion = totalCharacters ? Math.round((unlocked / totalCharacters) * 100) : 0;
          let state = 'incomplete';
          if (completion === 100 && totalCharacters > 0) state = 'complete';
          else if (completion > 0) state = 'advanced';
          return [key, {
            name: data.name,
            videos: data.videos,
            totalCharacters,
            unlockedCharacters: unlocked,
            completion,
            state
          }];
        })
      );
    }

    function normalizeEntityName(name) {
      return String(name || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function createModelId(prefix, value) {
      const base = cssSafe(String(value || '').trim() || `${prefix}-${Date.now()}`);
      return `${prefix}-${base || Date.now()}`;
    }

    function createEmptyCollectionModel() {
      return {
        actors: [],
        characters: [],
        universes: [],
        videos: [],
        worldMemberships: []
      };
    }

    function parseModelFromStorage(rawModel) {
      if (!rawModel || typeof rawModel !== 'object') return null;
      if (!Array.isArray(rawModel.actors) || !Array.isArray(rawModel.characters) || !Array.isArray(rawModel.universes) || !Array.isArray(rawModel.videos)) {
        return null;
      }
      const rawUniverseIds = new Set(
        rawModel.universes
          .filter(Boolean)
          .map(item => String(item.id || ''))
          .filter(Boolean)
      );
      return {
        actors: rawModel.actors.filter(Boolean).map(item => ({
          id: String(item.id || ''),
          name: String(item.name || 'Sin actor'),
          characterIds: Array.isArray(item.characterIds) ? [...new Set(item.characterIds.filter(Boolean).map(String))] : []
        })),
        characters: rawModel.characters.filter(Boolean).map(item => ({
          id: String(item.id || ''),
          name: String(item.name || 'Sin personaje'),
          actorIds: Array.isArray(item.actorIds) ? [...new Set(item.actorIds.filter(Boolean).map(String))] : [],
          universeIds: Array.isArray(item.universeIds) ? [...new Set(item.universeIds.filter(Boolean).map(String))] : [],
          videoIds: Array.isArray(item.videoIds) ? [...new Set(item.videoIds.filter(Boolean).map(String))] : [],
          unlocked: Boolean(item.unlocked)
        })),
        universes: rawModel.universes.filter(Boolean).map(item => ({
          id: String(item.id || ''),
          name: String(item.name || 'Sin universo'),
          characterIds: Array.isArray(item.characterIds) ? [...new Set(item.characterIds.filter(Boolean).map(String))] : [],
          kind: item.kind === 'world' ? 'world' : 'universe',
          parentUniverseIds: Array.isArray(item.parentUniverseIds) ? [...new Set(item.parentUniverseIds.filter(Boolean).map(String))] : []
        })),
        videos: rawModel.videos.filter(Boolean).map(item => ({
          id: String(item.id || ''),
          youtubeUrl: String(item.youtubeUrl || ''),
          title: String(item.title || ''),
          thumbnail: String(item.thumbnail || ''),
          characterId: String(item.characterId || ''),
          actorId: String(item.actorId || ''),
          universeIds: Array.isArray(item.universeIds) ? [...new Set(item.universeIds.filter(Boolean).map(String))] : []
        })),
        worldMemberships: Array.isArray(rawModel.worldMemberships)
          ? rawModel.worldMemberships
            .filter(Boolean)
            .map(item => ({
              worldUniverseId: String(item.worldUniverseId || ''),
              parentUniverseId: String(item.parentUniverseId || '')
            }))
            .filter(item => item.worldUniverseId && item.parentUniverseId)
            .filter(item => rawUniverseIds.has(item.worldUniverseId) && rawUniverseIds.has(item.parentUniverseId))
          : []
      };
    }

    function saveCollectionModel() {
      localStorage.setItem(COLLECTION_MODEL_STORAGE_KEY, JSON.stringify(collectionModel));
      scheduleCloudSync();
    }

    function loadCollectionModelFromStorage() {
      try {
        const raw = localStorage.getItem(COLLECTION_MODEL_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parseModelFromStorage(parsed);
      } catch (_) {
        return null;
      }
    }

    function getOrCreateActor(model, actorName, actorMap) {
      const normalized = normalizeEntityName(actorName || 'Sin actor');
      if (actorMap.has(normalized)) return actorMap.get(normalized);
      const actor = { id: createModelId('actor', normalized), name: (actorName || 'Sin actor').trim() || 'Sin actor', characterIds: [] };
      model.actors.push(actor);
      actorMap.set(normalized, actor);
      return actor;
    }

    function getOrCreateCharacter(model, characterName, characterMap) {
      const normalized = normalizeEntityName(characterName || 'Sin personaje');
      if (characterMap.has(normalized)) return characterMap.get(normalized);
      const character = { id: createModelId('character', normalized), name: (characterName || 'Sin personaje').trim() || 'Sin personaje', actorIds: [], universeIds: [], videoIds: [], unlocked: false };
      model.characters.push(character);
      characterMap.set(normalized, character);
      return character;
    }

    function getOrCreateUniverse(model, universeName, universeMap) {
      const normalized = normalizeEntityName(universeName || 'Sin universo');
      if (universeMap.has(normalized)) return universeMap.get(normalized);
      const universe = {
        id: createModelId('universe', normalized),
        name: (universeName || 'Sin universo').trim() || 'Sin universo',
        characterIds: [],
        kind: 'universe',
        parentUniverseIds: []
      };
      model.universes.push(universe);
      universeMap.set(normalized, universe);
      return universe;
    }

    function linkActorCharacter(actorId, characterId, model = collectionModel) {
      const actor = model.actors.find(item => item.id === actorId);
      const character = model.characters.find(item => item.id === characterId);
      if (!actor || !character) return;
      if (!actor.characterIds.includes(characterId)) actor.characterIds.push(characterId);
      if (!character.actorIds.includes(actorId)) character.actorIds.push(actorId);
    }

    function linkCharacterUniverse(characterId, universeId, model = collectionModel) {
      const character = model.characters.find(item => item.id === characterId);
      const universe = model.universes.find(item => item.id === universeId);
      if (!character || !universe) return;
      if (!character.universeIds.includes(universeId)) character.universeIds.push(universeId);
      if (!universe.characterIds.includes(characterId)) universe.characterIds.push(characterId);
    }

    function addVideoAndUnlockCharacter(videoPayload, model = collectionModel) {
      const video = {
        id: String(videoPayload.id || `video-${Date.now()}`),
        youtubeUrl: String(videoPayload.youtubeUrl || ''),
        title: String(videoPayload.title || ''),
        thumbnail: String(videoPayload.thumbnail || ''),
        characterId: String(videoPayload.characterId || ''),
        actorId: String(videoPayload.actorId || ''),
        universeIds: Array.isArray(videoPayload.universeIds) ? [...new Set(videoPayload.universeIds.filter(Boolean).map(String))] : []
      };
      model.videos.push(video);
      const character = model.characters.find(item => item.id === video.characterId);
      if (character) {
        if (!character.videoIds.includes(video.id)) character.videoIds.push(video.id);
        character.unlocked = true;
      }
      return video;
    }

    function migrateLegacyVideosToModel(legacyVideos) {
      const model = createEmptyCollectionModel();
      const actorMap = new Map();
      const characterMap = new Map();
      const universeMap = new Map();

      (legacyVideos || []).forEach((video, idx) => {
        const actor = getOrCreateActor(model, video?.actor_de_doblaje || 'Sin actor', actorMap);
        const character = getOrCreateCharacter(model, video?.personaje || 'Sin personaje', characterMap);
        linkActorCharacter(actor.id, character.id, model);
        const universeIds = getVideoUniverses(video).filter(Boolean).map((universeName) => {
          const universe = getOrCreateUniverse(model, universeName, universeMap);
          linkCharacterUniverse(character.id, universe.id, model);
          return universe.id;
        });
        addVideoAndUnlockCharacter({
          id: video?.id || `video-legacy-${idx + 1}`,
          youtubeUrl: video?.url_youtube || video?.url_video || '',
          title: video?.titulo || '',
          thumbnail: video?.thumbnail || '',
          characterId: character.id,
          actorId: actor.id,
          universeIds
        }, model);
      });
      return model;
    }

    function mergeModelWithLegacyVideos(currentModel, legacyVideos) {
      const baseModel = parseModelFromStorage(currentModel) || createEmptyCollectionModel();
      const model = {
        actors: baseModel.actors.map((actor) => ({ ...actor, characterIds: Array.isArray(actor.characterIds) ? [...new Set(actor.characterIds)] : [] })),
        characters: baseModel.characters.map((character) => ({
          ...character,
          actorIds: Array.isArray(character.actorIds) ? [...new Set(character.actorIds)] : [],
          universeIds: Array.isArray(character.universeIds) ? [...new Set(character.universeIds)] : [],
          videoIds: [],
          unlocked: false
        })),
        universes: baseModel.universes.map((universe) => ({
          ...universe,
          characterIds: Array.isArray(universe.characterIds) ? [...new Set(universe.characterIds)] : [],
          kind: universe.kind === 'world' ? 'world' : 'universe',
          parentUniverseIds: Array.isArray(universe.parentUniverseIds) ? [...new Set(universe.parentUniverseIds)] : []
        })),
        videos: [],
        worldMemberships: Array.isArray(baseModel.worldMemberships)
          ? baseModel.worldMemberships
            .filter(Boolean)
            .map((item) => ({
              worldUniverseId: String(item.worldUniverseId || ''),
              parentUniverseId: String(item.parentUniverseId || '')
            }))
            .filter((item) => item.worldUniverseId && item.parentUniverseId)
          : []
      };

      const actorMap = new Map(model.actors.map((actor) => [normalizeEntityName(actor.name), actor]));
      const characterMap = new Map(model.characters.map((character) => [normalizeEntityName(character.name), character]));
      const universeMap = new Map(model.universes.map((universe) => [normalizeEntityName(universe.name), universe]));

      (legacyVideos || []).forEach((video, idx) => {
        const actor = getOrCreateActor(model, video?.actor_de_doblaje || 'Sin actor', actorMap);
        const character = getOrCreateCharacter(model, video?.personaje || 'Sin personaje', characterMap);
        linkActorCharacter(actor.id, character.id, model);

        const universeIds = getVideoUniverses(video).filter(Boolean).map((universeName) => {
          const universe = getOrCreateUniverse(model, universeName, universeMap);
          linkCharacterUniverse(character.id, universe.id, model);
          return universe.id;
        });

        addVideoAndUnlockCharacter({
          id: video?.id || `video-legacy-${idx + 1}`,
          youtubeUrl: video?.url_youtube || video?.url_video || '',
          title: video?.titulo || '',
          thumbnail: video?.thumbnail || '',
          characterId: character.id,
          actorId: actor.id,
          universeIds
        }, model);
      });

      return model;
    }

    function normalizeUniverseName(name) {
      return String(name || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function isUnassignedUniverseName(name) {
      const normalized = normalizeUniverseName(name);
      return !normalized
        || normalized === normalizeUniverseName(SPECIAL_UNASSIGNED_UNIVERSE)
        || normalized === normalizeUniverseName('Sin universos')
        || normalized === normalizeUniverseName('Ninguno');
    }

    function normalizeUniverseList(rawUniverses, { fallbackToUnassigned = true } = {}) {
      const preferred = [];
      const seenPreferred = new Set();
      let hasUnassigned = false;
      (Array.isArray(rawUniverses) ? rawUniverses : [rawUniverses]).forEach((rawName) => {
        const canonicalName = String(rawName || '').trim();
        const normalizedName = normalizeUniverseName(canonicalName);
        if (isUnassignedUniverseName(canonicalName)) {
          hasUnassigned = true;
          return;
        }
        if (!normalizedName || seenPreferred.has(normalizedName)) return;
        preferred.push(canonicalName);
        seenPreferred.add(normalizedName);
      });
      if (preferred.length) return preferred;
      if (hasUnassigned && fallbackToUnassigned) return [SPECIAL_UNASSIGNED_UNIVERSE];
      return fallbackToUnassigned ? [SPECIAL_UNASSIGNED_UNIVERSE] : [];
    }

    function getCharacterUniverseList(characterName, { fallbackToUnassigned = false } = {}) {
      const normalizedCharacter = normalizeName(characterName || '');
      const rawUniverses = VIDEOS
        .filter((video) => normalizeName(video.personaje || '') === normalizedCharacter)
        .flatMap((video) => getVideoUniverses(video));
      return normalizeUniverseList(rawUniverses, { fallbackToUnassigned });
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeName(name) {
      return String(name || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function getActorInitialLetter(name) {
      const first = (String(name || '').trim().match(/[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]/) || [])[0] || '';
      const plain = first.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
      return plain >= 'A' && plain <= 'Z' ? plain : '#';
    }

    function getCharacterIdByName(name) {
      return cssSafe(normalizeName(name));
    }

    function getCharacterNameById(characterId) {
      if (!characterId) return '';
      const modelCharacter = (collectionModel.characters || [])
        .find(item => getCharacterIdByName(item.name) === characterId);
      if (modelCharacter?.name) return modelCharacter.name;
      return [...new Set(VIDEOS.map(v => String(v.personaje || '').trim()).filter(Boolean))]
        .find(name => getCharacterIdByName(name) === characterId) || '';
    }

    function createPlaceholderCover(name) {
